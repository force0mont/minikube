name: Bug Report (Polski)
description: Zgłoś błąd, aby pomóc nam ulepszyć minikube
labels: ["kind/bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Dziękujemy za zgłoszenie błędu! Wypełnij poniższy formularz, aby pomóc nam zrozumieć problem.
  - type: textarea
    id: description
    attributes:
      label: Opis błędu
      description: Jasny i zwięzły opis tego, co jest błędem.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Kroki do odtworzenia
      description: Kroki do odtworzenia zachowania.
      placeholder: |
        1. Uruchom '...'
        2. Kliknij '...'
        3. Przewiń do '...'
        4. Zobacz błąd
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Oczekiwane zachowanie
      description: Jasny i zwięzły opis tego, czego oczekiwałeś.
    validations:
      required: true
  - type: textarea
    id: minikube-version
    attributes:
      label: Wersja minikube
      description: Uruchom `minikube version` i wklej wynik tutaj.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Środowisko
      description: |
        Uruchom `minikube logs --problems` i wklej wynik tutaj.
        Podaj też informacje o swoim systemie operacyjnym i sterowniku.
      render: shell
    validations:
      required: true
  - type: textarea
    id: driver
    attributes:
      label: Sterownik
      description: Jakiego sterownika używasz? (np. docker, virtualbox, hyperv)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logi
      description: |
        Wklej tutaj odpowiednie logi. Możesz uruchomić `minikube logs` aby je uzyskać.
      render: shell
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Dodatkowy kontekst
      description: Dodaj tutaj wszelki inny kontekst dotyczący problemu, zrzuty ekranu itp.
    validations:
      required: false
