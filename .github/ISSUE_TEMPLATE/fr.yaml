name: Bug Report (Français)
description: Signalez un bug dans minikube
labels: ["kind/bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de remplir ce rapport de bug ! Veuillez remplir autant d'informations que possible.
  - type: textarea
    id: description
    attributes:
      label: Description du problème
      description: Une description claire et concise du bug.
      placeholder: Décrivez le problème ici...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Une description claire et concise de ce que vous attendiez.
      placeholder: Ce qui devrait se passer...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportement actuel
      description: Une description claire et concise de ce qui se passe réellement.
      placeholder: Ce qui se passe réellement...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Étapes pour reproduire
      description: Étapes pour reproduire le comportement.
      placeholder: |
        1. Exécuter '...'
        2. Voir l'erreur '...'
    validations:
      required: true
  - type: textarea
    id: minikube-info
    attributes:
      label: Informations sur l'environnement
      description: Veuillez exécuter `minikube logs` et `minikube status` et coller le résultat ici.
      placeholder: Collez la sortie de `minikube logs` et `minikube status` ici...
    validations:
      required: false
  - type: dropdown
    id: os
    attributes:
      label: Système d'exploitation
      options:
        - Linux
        - macOS
        - Windows
        - Autre
    validations:
      required: true
  - type: input
    id: minikube-version
    attributes:
      label: Version de minikube
      description: Quelle version de minikube utilisez-vous ? Exécutez `minikube version`.
      placeholder: ex. v1.32.0
    validations:
      required: true
  - type: input
    id: driver
    attributes:
      label: Driver
      description: Quel driver utilisez-vous ? (ex. docker, virtualbox, kvm2, hyperkit)
      placeholder: ex. docker
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Contexte supplémentaire
      description: Ajoutez tout autre contexte concernant le problème ici.
      placeholder: Informations supplémentaires...
    validations:
      required: false
