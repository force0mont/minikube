name: Bug Report (Deutsch)
description: Melden Sie einen Fehler, um uns zu helfen, minikube zu verbessern
title: "[Bug] "
labels: ["kind/bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Vielen Dank, dass Sie sich die Zeit nehmen, diesen Fehler zu melden!
        Bitte füllen Sie das Formular so vollständig wie möglich aus.

  - type: textarea
    id: description
    attributes:
      label: Fehlerbeschreibung
      description: Eine klare und präzise Beschreibung des Fehlers.
      placeholder: Was ist passiert?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Schritte zur Reproduktion
      description: Schritte zur Reproduktion des Verhaltens.
      placeholder: |
        1. Führen Sie '...' aus
        2. Klicken Sie auf '...'
        3. Scrollen Sie nach unten zu '...'
        4. Fehler wird angezeigt
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
      description: Eine klare und präzise Beschreibung dessen, was Sie erwartet haben.
    validations:
      required: true

  - type: textarea
    id: minikube-version
    attributes:
      label: minikube Version
      description: Ausgabe von `minikube version`
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Umgebungsinformationen
      description: Ausgabe von `minikube logs --file=logs.txt` und `minikube status`
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Zusätzlicher Kontext
      description: Fügen Sie hier weiteren Kontext oder Screenshots zum Problem hinzu.
    validations:
      required: false
